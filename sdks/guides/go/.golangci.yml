version: "2"
# Guides module - extends root config, lint as standalone
# Lenient for doc examples: unused params in callbacks show API, unused helper funcs are for snippets
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unused
  exclusions:
    paths:
      - integrations/  # ocr_tesseract needs Tesseract C lib (native dep)
    rules:
      # Doc examples: callback signatures show API, mock/trigger funcs for snippets
      - path: (.+)\.go$
        text: "unused-parameter:"
      - path: (.+)\.go$
        text: "package-comments:"
      - path: (.+)\.go$
        text: " is unused"
      - path: (.+)\.go$
        text: "exitAfterDefer:"
