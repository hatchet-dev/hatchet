<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hatchet</title>
    <meta
      name="description"
      content="Write workflows as code. Scale with Hatchet."
    />
    <link
      href="https://fonts.googleapis.com/css?family=Ubuntu:400,500,700"
      rel="stylesheet"
    />
    <meta property="og:title" content="Hatchet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hatchet</title>
    <!-- Apply theme before paint: default system (prefers-color-scheme), or stored choice -->
    <script>
      (function () {
        try {
          var key = 'vite-ui-theme';
          var stored = localStorage.getItem(key);
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system';
          var resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme;
          document.documentElement.classList.add(resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
