version: "2"
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    govet:
      enable-all: true
      disable:
        - printf
        - shadow
        - fieldalignment
    staticcheck:
      checks:
        - all
        - -SA1029
        - -SA4006
        - -ST1003
        - -ST1005
        - -ST1016
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: by other packages, and that stutters; consider calling this
      - path: (.+)\.go$
        text: "var-naming:"
      - path: (.+)\.go$
        text: "receiver-naming:"
      - path: (.+)\.go$
        text: "unexported-return:"
      - path: (.+)\.go$
        text: "unused-parameter: parameter"
      - path: (.+)\.go$
        text: "context-keys-type: should not use basic type"
      - path: (.+)\.go$
        text: error strings should not be capitalized
      - path: "internal/services/dispatcher/(.+).go"
        text: "ST1016:"
      - linters:
          - staticcheck
        text: "ST1003:"
      # The following packages intentionally use Hatchet's deprecated legacy v0/v1
      # SDK and worker internals during the gradual migration to sdks/go, and
      # internal/services/admin/v1 must keep accepting deprecated request fields
      # from old clients for backward compatibility.
      - path: "^(pkg/v1|pkg/worker|pkg/client|sdks/go|cmd/hatchet-loadtest|cmd/hatchet-cli|internal/services/admin/v1)/(.+)\\.go$"
        linters:
          - staticcheck
        text: "SA1019:"
      - path: "internal/cel/cel.go"
        text: "SA1019: cel.Declarations is deprecated"
      - path: "internal/msgqueue/rabbitmq/rabbitmq.go"
        text: "SA1019: msg.Retries is deprecated"

    paths:
      - third_party$
      - builtin$
      - ^examples/
      - ^sdks/go/examples/
      - '(.+)_test\.go'
      - "cmd/hatchet-loadtest/rampup/(.+).go"
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/hatchet-dev/hatchet
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - ^examples/
      - ^sdks/go/examples/
