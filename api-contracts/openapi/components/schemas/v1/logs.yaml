V1LogLine:
  properties:
    createdAt:
      type: string
      format: date-time
      description: The creation date of the log line.
    message:
      type: string
      description: The log message.
    metadata:
      type: object
      description: The log metadata.
    taskExternalId:
      type: string
      description: The external ID of the task associated with the log line.
      format: uuid
      minLength: 36
      maxLength: 36
    taskDisplayName:
      type: string
      description: The display name of the task associated with the log line.
    retryCount:
      type: integer
      description: The retry count of the log line.
    attempt:
      type: integer
      description: The attempt number of the log line.
    level:
      $ref: "#/V1LogLineLevel"
      description: The log level.
  required:
    - createdAt
    - message
    - metadata

V1LogLineLevel:
  type: string
  enum:
    - DEBUG
    - INFO
    - WARN
    - ERROR

V1LogLineOrderByDirection:
  type: string
  enum:
    - ASC
    - DESC

V1LogLineList:
  properties:
    pagination:
      $ref: "../metadata.yaml#/PaginationResponse"
    rows:
      items:
        $ref: "#/V1LogLine"
      type: array

V1LogsPointMetric:
  type: object
  properties:
    time:
      type: string
      format: date-time
    DEBUG:
      type: integer
    INFO:
      type: integer
    WARN:
      type: integer
    ERROR:
      type: integer
  required:
    - time
    - DEBUG
    - INFO
    - WARN
    - ERROR

V1LogsPointMetrics:
  type: object
  properties:
    results:
      type: array
      items:
        $ref: "#/V1LogsPointMetric"
