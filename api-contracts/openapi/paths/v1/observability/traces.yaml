getTrace:
  get:
    x-resources: ["tenant"]
    description: Get OTel trace for a workflow run
    operationId: v1-observability:get-trace
    parameters:
      - description: The tenant id
        in: path
        name: tenant
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The workflow run external id
        in: query
        name: run_external_id
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
      - description: The number of spans to skip
        in: query
        name: offset
        required: false
        schema:
          type: integer
          format: int64
      - description: The number of spans to limit by
        in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int64
    responses:
      "200":
        content:
          application/json:
            schema:
              $ref: "../../../components/schemas/_index.yaml#/OtelSpanList"
        description: Successfully retrieved the OTel trace
      "400":
        content:
          application/json:
            schema:
              $ref: "../../../components/schemas/_index.yaml#/APIErrors"
        description: A malformed or bad request
      "403":
        content:
          application/json:
            schema:
              $ref: "../../../components/schemas/_index.yaml#/APIErrors"
        description: Forbidden
    summary: Get OTel trace
    tags:
      - Observability
