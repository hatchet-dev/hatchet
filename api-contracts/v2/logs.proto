syntax = "proto3";

option go_package = "github.com/hatchet-dev/hatchet/internal/services/shared/proto/v2";

package v2;

import "google/protobuf/timestamp.proto";

// LogService ingests log lines and stream events emitted by task runs. Both
// RPCs are bulk-first; a single put is a one-element batch.
service LogService {
    rpc PutLogs(PutLogsRequest) returns (PutLogsResponse) {}

    rpc PutStreamEvents(PutStreamEventsRequest) returns (PutStreamEventsResponse) {}
}

enum LogLevel {
    LOG_LEVEL_UNSPECIFIED = 0;
    LOG_LEVEL_DEBUG = 1;
    LOG_LEVEL_INFO = 2;
    LOG_LEVEL_WARN = 3;
    LOG_LEVEL_ERROR = 4;
}

message Log {
    string task_run_external_id = 1; // (required) the external id of the task run
    google.protobuf.Timestamp seen_at = 2; // (required) when the log line was seen
    string message = 3; // (required) the log line message
    optional LogLevel level = 4; // (optional) the log level, default INFO
    optional bytes extra = 5; // (optional) extra user metadata for the log line
    optional int32 retry_count = 6; // (optional) the retry attempt of the task run
}

message PutLogsRequest {
    repeated Log logs = 1;
}

message PutLogsResponse {}

message StreamEvent {
    string task_run_external_id = 1; // (required) the external id of the task run
    google.protobuf.Timestamp seen_at = 2; // (required) when the stream event was seen
    bytes message = 3; // (required) the stream event chunk
    optional bytes extra = 4; // (optional) extra user metadata for the stream event
    optional int64 event_index = 5; // (optional) ordering index for the stream
    optional int32 retry_count = 6; // (optional) the retry attempt of the task run
}

message PutStreamEventsRequest {
    repeated StreamEvent events = 1;
}

message PutStreamEventsResponse {}
