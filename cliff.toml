# git-cliff ~ configuration file
# keepachangelog | keep: core scope OR engine label | group by type
# https://git-cliff.org/docs/configuration
#
# Adapted from https://github.com/orhun/git-cliff/blob/main/examples/github-keepachangelog.toml

[remote.github]
# NOTE: this requires a GitHub auth token passed via GITHUB_TOKEN.
owner = "hatchet-dev"
repo  = "hatchet"

[changelog]
header = """
{%- set latest = releases | filter(attribute="version") | first -%}
# Release [{{ latest.version | trim_start_matches(pat="v") }}] - {{ latest.timestamp | date(format="%Y-%m-%d") }}

<!-- Optional: High-level summary of the release in plain language -- what changed and why it matters to users. -->
<!-- ## 📝 Summary -->

<!-- Optional: New features and improvements. Describe what each one does for the user. -->
<!-- ## ✨ Enhancements -->

<!-- Optional: Features or APIs being phased out. Note the replacement and any migration steps. -->
<!-- ## ⚠️ Deprecations -->

<!-- Optional: Notable bug fixes and how they benefit the user. -->
<!-- ## 🐛 Bug Fixes -->

## Changelog
{%- for release in releases %}
{%- if release.version %}
- [v{{ release.version | trim_start_matches(pat="v") }}](#{{ release.version | trim_start_matches(pat="v") | replace(from=".", to="") }}---{{ release.timestamp | date(format="%Y-%m-%d") }})
{%- endif %}
{% endfor %}
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    {%- set_global shown = 0 -%}
    {%- for commit in commits %}
        {%- set core = commit.scope and commit.scope is matching("engine|api|migrate|admin|cli|dashboard|lite") -%}
        {%- set labeled = commit.remote.pr_labels is containing("engine") -%}
        {%- if core or labeled -%}
            {%- if shown == 0 %}
    ### {{ group | striptags | trim | upper_first }}
            {%- endif -%}
            {%- set_global shown = shown + 1 %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | split(pat="\n") | first | upper_first | trim }}\
            {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif -%}
            {% if commit.remote.pr_number %} in \
            [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})\
            {%- endif -%}
        {%- endif -%}
    {% endfor %}
{% endfor %}
"""

# The footer is basically just a section for new contributors
# TODO(gregfurman: should we be including ONLY the contributors to engine etc. or all new contributors,
# even if changes were not in release?
footer = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}
{%- set new_contributors = [] -%}
{%- for release in releases -%}
  {%- for contributor in release.github.contributors | filter(attribute="is_first_time", value=true) -%}
    {%- set_global new_contributors = new_contributors | concat(with=contributor) -%}
  {%- endfor -%}
{%- endfor -%}
{%- if new_contributors | length != 0 %}
### New Contributors
{%- endif %}
{%- for contributor in new_contributors %}
* @{{ contributor.username }} made their first contribution
  {%- if contributor.pr_number %} in [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}){%- endif %}
{%- endfor %}
"""

trim = true

postprocessors = [
  { pattern = '<!-- \\d+ -->', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = true
filter_commits = true
split_commits = false

commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]

# Group EVERY changelog-relevant commit by type (no scope filter here — the
# template decides what to show). Drop noise types outright.
commit_parsers = [
  { message = "^chore",  skip = true },
  { message = "^ci",     skip = true },
  { message = "^docs",   skip = true },
  { message = "^build",  skip = true },
  { message = "^style",  skip = true },

  { message = "^.*!:",          group = "<!-- 1 -->Changed" },
  { body = ".*BREAKING CHANGE", group = "<!-- 1 -->Changed" },
  { message = "^feat",          group = "<!-- 0 -->Added" },
  { message = "^perf",          group = "<!-- 1 -->Changed" },
  { message = "^refactor",      group = "<!-- 1 -->Changed" },
  { message = "^revert",        group = "<!-- 3 -->Removed" },
  { message = "^fix",           group = "<!-- 4 -->Fixed" },
  { message = "^test",          group = "<!-- 4 -->Fixed" },
  { message = ".*",             group = "<!-- 1 -->Changed" },
]

# Only core release tags — excludes vpy/..., py/..., sdk tags, etc.
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"

topo_order = false
sort_commits = "newest"
