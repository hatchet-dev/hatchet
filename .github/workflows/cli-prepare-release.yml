name: Prepare release pull request

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v0.73.10
      - "!v*-alpha*" # Do not trigger for alpha releases

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Get release PR branch
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="$(gh pr list \
            --base main \
            --state open \
            --label release \
            --limit 1 \
            --json headRefName \
            --jq '.[0].headRefName // empty')"
          echo "branch=${BRANCH:-release-$(date -u +%Y%m%d)}" >> "$GITHUB_OUTPUT"

      - name: Switch to that branch if it exists
        run: |
          BRANCH="${{ steps.pr.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git rebase origin/main
          fi

      - name: Skip if tag already in changelog
        id: check
        run: |
          if grep -q "^## \[${GITHUB_REF_NAME#v}\]" CHANGELOG.md; then
            echo "already=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepend release section
        if: steps.check.outputs.already != 'true'
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5
        with:
          config: cliff.toml
          args: --tag ${{ github.ref_name }} --strip header --prepend CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open / update release pull-request
        if: steps.check.outputs.already != 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          branch: ${{ steps.pr.outputs.branch }}
          base: main
          title: "chore: Release ${{ github.ref_name }}"
          commit-message: "docs: changelog for ${{ github.ref_name }}"
          body: "Automated release PR. The changelog is regenerated on every new tag push and accumulates each tagged release until merged."
          labels: release
          draft: true
          delete-branch: true
