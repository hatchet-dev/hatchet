on:
  workflow_run:
    workflows: ["Create prerelease w/ binaries and static assets"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to use for the release"
        required: true
name: Release
jobs:
  load:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    strategy:
      matrix:
        migrate-strategy: ["latest"]
        rabbitmq-enabled: ["true", "false"]
        pg-version: ["15-alpine", "16-alpine", "17-alpine"]
        optimistic-scheduling: ["true", "false"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.16.1
          run_install: false

      - name: Go deps
        run: go mod download

      - name: Test
        run: |
          go test -tags load ./... -p 5 -v -race -failfast -timeout 20m
        env:
          TESTING_MATRIX_MIGRATE: ${{ matrix.migrate-strategy }}
          TESTING_MATRIX_RABBITMQ_ENABLED: ${{ matrix.rabbitmq-enabled }}
          TESTING_MATRIX_PG_VERSION: ${{ matrix.pg-version }}
  push-hatchet-server:
    name: Push latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          [api, engine, admin, frontend, migrate, lite, dashboard, loadtest]
    steps:
      - name: Get tag name
        id: tag_name
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and push ${{ matrix.image }}
        env:
          IMAGE: ghcr.io/hatchet-dev/hatchet/hatchet-${{ matrix.image }}
          TAG: ${{ steps.tag_name.outputs.tag }}
        run: |
          docker pull "$IMAGE:$TAG-amd64"
          docker pull "$IMAGE:$TAG-arm64"
          docker manifest create "$IMAGE:latest" \
            "$IMAGE:$TAG-amd64" \
            "$IMAGE:$TAG-arm64"
          docker manifest push "$IMAGE:latest"
