name: "Pull Request Labeler"

on:
- pull_request_target

jobs:
  labeler:
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
      with:
        sync-labels: true
