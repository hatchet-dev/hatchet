name: Publish CI Health Dashboard

# Publishes the CI Health Dashboard issue (#4204) from a committed, rendered body.
# The dashboard is generated by an agent (laptop or Cursor automation) which renders
# hack/ci/ci-dashboard/staging/issue.md and pushes it to the ci-health-dashboard
# branch; this job has the issues:write permission the agent token lacks, so it is
# the single source of truth for actually editing the issue.

on:
  push:
    branches: [ci-health-dashboard]
    paths: [hack/ci/ci-dashboard/staging/issue.md]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Avoid racing updates if several pushes land close together.
concurrency:
  group: ci-health-dashboard-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Publish staged dashboard body to the issue
        working-directory: hack/ci/ci-dashboard
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run publish.py --publish --body-file staging/issue.md
