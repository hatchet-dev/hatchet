            exit 1
          fi

      - name: Generate API token
        run: |
          echo "HATCHET_CLIENT_TOKEN=$(go run ./cmd/hatchet-admin token create --config ./generated/ --tenant-id 707d0855-80ab-4e1f-a156-f1c4546cbf52)" >> $GITHUB_ENV
          echo "HATCHET_CLIENT_TLS_STRATEGY=none" >> $GITHUB_ENV

      - name: Test
        run: |
          go test -tags e2e ./... -p 1 -v -failfast

      - name: Teardown
        run: docker compose down

  load:
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    strategy:
      matrix:
        migrate-strategy: ["latest"]
        rabbitmq-enabled: ["true"]
        pg-version: ["17-alpine"]
        optimistic-scheduling: ["true", "false"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.16.1
          run_install: false

      - name: Go deps
        run: go mod download

      - name: Test
        run: |
          # Disable gzip compression for load tests to reduce CPU overhead
          # Compression adds overhead without benefit for 0kb payloads
          HATCHET_CLIENT_DISABLE_GZIP_COMPRESSION=true go test -tags load ./... -p 5 -v -race -failfast -timeout 20m
        env:
          TESTING_MATRIX_MIGRATE: ${{ matrix.migrate-strategy }}
          TESTING_MATRIX_RABBITMQ_ENABLED: ${{ matrix.rabbitmq-enabled }}
          TESTING_MATRIX_PG_VERSION: ${{ matrix.pg-version }}
          TESTING_MATRIX_OPTIMISTIC_SCHEDULING: ${{ matrix.optimistic-scheduling }}
          HATCHET_LOADTEST_STARTUP_SLEEP: 120s

  load-pgbouncer:
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    strategy:
      matrix:
        migrate-strategy: ["latest"]
        rabbitmq-enabled: ["true"]
        pg-version: ["17-alpine"]
        optimistic-scheduling: ["true", "false"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.16.1
          run_install: false

      - name: Go deps
        run: go mod download

      - name: Test
        run: |
          # Disable gzip compression for load tests to reduce CPU overhead
          # Compression adds overhead without benefit for 0kb payloads
          HATCHET_CLIENT_DISABLE_GZIP_COMPRESSION=true go test -tags load ./... -p 5 -v -race -failfast -timeout 20m
        env:
          TESTING_MATRIX_MIGRATE: ${{ matrix.migrate-strategy }}
          TESTING_MATRIX_RABBITMQ_ENABLED: ${{ matrix.rabbitmq-enabled }}
          TESTING_MATRIX_PG_VERSION: ${{ matrix.pg-version }}
          TESTING_MATRIX_OPTIMISTIC_SCHEDULING: ${{ matrix.optimistic-scheduling }}
          TESTING_MATRIX_PGBOUNCER_ENABLED: "true"
          HATCHET_LOADTEST_STARTUP_SLEEP: 120s

  load-online-migrate:
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://hatchet:hatchet@127.0.0.1:5431/hatchet?sslmode=disable
      SERVER_GRPC_PORT: "7077"
      SERVER_GRPC_BROADCAST_ADDRESS: localhost:7077
      SERVER_GRPC_INSECURE: "true"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "true"
      SERVER_MSGQUEUE_KIND: postgres
      SERVER_LOGGER_LEVEL: warn
      SERVER_LOGGER_FORMAT: console
      DATABASE_LOGGER_LEVEL: warn
      DATABASE_LOGGER_FORMAT: console

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"

      - name: Go deps
        run: go mod download

      - name: Compose
        run: docker compose up -d

      - name: Determine penultimate migration version
        run: |
          PENULTIMATE_VERSION=$(ls cmd/hatchet-migrate/migrate/migrations/ | grep -E '^[0-9]+' | sort | tail -2 | head -1 | cut -d'_' -f1)
          echo "Penultimate migration version: $PENULTIMATE_VERSION"
          echo "PENULTIMATE_VERSION=$PENULTIMATE_VERSION" >> $GITHUB_ENV

      - name: Run migrations up to penultimate
        run: go run ./cmd/hatchet-migrate --up-to-penultimate

      - name: Setup config and seed database
        run: |
          mkdir -p generated
          go run ./cmd/hatchet-admin quickstart --skip certs --generated-config-dir ./generated

      - name: Generate API token
        run: |
          TOKEN=$(go run ./cmd/hatchet-admin --config ./generated token create)
          echo "HATCHET_CLIENT_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Start engine
        run: |
          go run ./cmd/hatchet-engine --config ./generated > /tmp/engine.log 2>&1 &
          echo $! > /tmp/engine.pid
          echo "Waiting 30s for engine to start..."
          sleep 30

      - name: Run load test with migrations
        run: |
          HATCHET_CLIENT_TOKEN="${{ env.HATCHET_CLIENT_TOKEN }}" \
          HATCHET_CLIENT_TLS_STRATEGY=none \
          HATCHET_CLIENT_HOST_PORT=localhost:7077 \
          go run ./cmd/hatchet-loadtest loadtest -e 10 -d 240s -w 60s -s 100 > /tmp/loadtest.log 2>&1 &
          LOADTEST_PID=$!
          echo $LOADTEST_PID > /tmp/loadtest.pid

          echo "Waiting 30s for load test to get started..."
          sleep 30

          echo "Applying last migration..."
          go run ./cmd/hatchet-migrate
          echo "Last migration applied"

          echo "Migrating down to penultimate version ${{ env.PENULTIMATE_VERSION }}..."
          go run ./cmd/hatchet-migrate --down ${{ env.PENULTIMATE_VERSION }}
          echo "Down migration successful"

          echo "Re-applying migrations..."
          go run ./cmd/hatchet-migrate
          echo "Re-migration successful"

          echo "Waiting for load test to complete..."
          if ! wait $LOADTEST_PID; then
            echo "=== Load test logs ==="
            cat /tmp/loadtest.log
            echo "=== Engine logs ==="
            cat /tmp/engine.log
            exit 1
          fi
          echo "Load test passed"

      - name: Teardown
        if: always()
        run: |
          if [ -f /tmp/loadtest.pid ]; then kill $(cat /tmp/loadtest.pid) 2>/dev/null || true; fi
          if [ -f /tmp/engine.pid ]; then kill $(cat /tmp/engine.pid) 2>/dev/null || true; fi
          docker compose down

  load-deadlock:
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    strategy:
      matrix:
        migrate-strategy: ["latest"]
        rabbitmq-enabled: ["true"]
        pg-version: ["17-alpine"]
        optimistic-scheduling: ["true", "false"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.16.1
          run_install: false

      - name: Go deps
        run: go mod download

      - name: Add go-deadlock dependency
        run: go get github.com/sasha-s/go-deadlock@v0.3.6

      - name: Patch sync.Mutex/RWMutex to use go-deadlock
        shell: bash
        run: |
          set -euo pipefail

          # Find only files that actually use sync.Mutex or sync.RWMutex.
          grep -rl --include='*.go' -E 'sync\.(RW)?Mutex' . | grep -v '/vendor/' > /tmp/mutex_files.txt || true

          if [ ! -s /tmp/mutex_files.txt ]; then
            echo "No files with sync.Mutex or sync.RWMutex found"
            exit 0
          fi

          echo "Patching $(wc -l < /tmp/mutex_files.txt) file(s):"
          cat /tmp/mutex_files.txt

          while IFS= read -r f; do
            # Rewrite type references. RWMutex first so its 'Mutex' suffix isn't clobbered.
            sed -i'' -E \
              -e 's/sync\.RWMutex/deadlocksync.RWMutex/g' \
              -e 's/sync\.Mutex/deadlocksync.Mutex/g' \
              "$f"

            # \bsync\. won't match inside "deadlocksync.", so this correctly detects
            # remaining usages of other sync primitives (WaitGroup, Once, Map, etc.).
            if grep -qE '\bsync\.' "$f"; then
              # File still needs the sync package; insert deadlocksync import alongside it.
              awk '
                /^\t"sync"$/ { print; print "\tdeadlocksync \"github.com/sasha-s/go-deadlock\""; next }
                { print }
              ' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
            else
              # sync package no longer needed; replace its import with the deadlocksync alias.
              sed -i'' \
                -e 's|^\t"sync"$|\tdeadlocksync "github.com/sasha-s/go-deadlock"|' \
                -e 's|^import "sync"$|import deadlocksync "github.com/sasha-s/go-deadlock"|' \
                "$f"
            fi
          done < /tmp/mutex_files.txt

          xargs gofmt -w < /tmp/mutex_files.txt

          echo "Changed Go files (after patch):"
          git diff --name-only -- '*.go' || true

      - name: Test (deadlock-instrumented)
        run: |
          # Disable gzip compression for load tests to reduce CPU overhead
          # Compression adds overhead without benefit for 0kb payloads
          HATCHET_CLIENT_DISABLE_GZIP_COMPRESSION=true go test -tags load ./... -p 5 -v -race -failfast -timeout 20m
        env:
          # This job adds go-deadlock + -race overhead; relax perf threshold to avoid flakes.
          HATCHET_LOADTEST_AVERAGE_DURATION_THRESHOLD: 1s
          # Give the engine a bit more time to come up under instrumentation.
          HATCHET_LOADTEST_STARTUP_SLEEP: 120s
          TESTING_MATRIX_MIGRATE: ${{ matrix.migrate-strategy }}
          TESTING_MATRIX_RABBITMQ_ENABLED: ${{ matrix.rabbitmq-enabled }}
          TESTING_MATRIX_PG_VERSION: ${{ matrix.pg-version }}
          TESTING_MATRIX_OPTIMISTIC_SCHEDULING: ${{ matrix.optimistic-scheduling }}

  rampup:
    runs-on: ubicloud-standard-8
    timeout-minutes: 30
    strategy:
      matrix:
        migrate-strategy: ["latest"]
        rabbitmq-enabled: ["true"]
        pg-version: ["17-alpine"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.16.1
          run_install: false

      - name: Go deps
        run: go mod download

      - name: Test
        run: |
          go test -tags rampup ./... -p 5 -v -race -failfast -timeout 20m
        env:
          TESTING_MATRIX_MIGRATE: ${{ matrix.migrate-strategy }}
          TESTING_MATRIX_RABBITMQ_ENABLED: ${{ matrix.rabbitmq-enabled }}
          TESTING_MATRIX_PG_VERSION: ${{ matrix.pg-version }}
          RAMP_UP_DURATION_TIMEOUT: 30s
