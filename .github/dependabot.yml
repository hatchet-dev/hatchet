version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/examples/go/quickstart"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      go-modules-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "pip"
    directories:
      - "/sdks/python"
      - "/sdks/python/examples/quickstart"
      - "/cmd/hatchet-cli/cli/templates/python/poetry"
      - "/examples/python/quickstart"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      python-types:
        patterns:
          - "types-*"
      python-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      python-deps-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "npm"
    directories:
      - "/frontend/app"
      - "/frontend/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      npm-deps:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      npm-deps-major:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "major"
      npm-dev-deps:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/sdks/typescript"
      - "/cmd/hatchet-cli/cli/templates/typescript/pnpm"
      - "/examples/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      otel:
        patterns:
          - "@opentelemetry/*"
      npm-sdk-deps:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      npm-sdk-deps-major:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "major"
      npm-sdk-dev-deps:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directories:
      - "/sdks/ruby/src"
      - "/sdks/ruby/examples"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      ruby-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      ruby-deps-major:
        patterns:
          - "*"
        update-types:
          - "major"
