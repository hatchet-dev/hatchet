version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/examples/go/quickstart"
    schedule:
      interval: "daily"
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "pip"
    directories:
      - "/sdks/python"
      - "/sdks/python/examples/quickstart"
      - "/cmd/hatchet-cli/cli/templates/python/poetry"
      - "/examples/python/quickstart"
    schedule:
      interval: "daily"
    groups:
      python-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "npm"
    directories:
      - "/frontend/app"
      - "/frontend/docs"
      - "/sdks/typescript"
      - "/cmd/hatchet-cli/cli/templates/typescript/pnpm"
      - "/examples/typescript"
    schedule:
      interval: "daily"
    groups:
      npm-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "bundler"
    directories:
      - "/sdks/ruby/src"
      - "/sdks/ruby/examples"
    schedule:
      interval: "daily"
    groups:
      ruby-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
