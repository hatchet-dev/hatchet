version: 2

multi-ecosystem-groups:
  hatchet-sdk-examples:
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 30
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 2
    groups:
      go-modules:
        patterns: ["*"]
        update-types: ["patch", "minor"]

  - package-ecosystem: "pip"
    directory: /sdks/python
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 2
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["patch", "minor"]


  - package-ecosystem: uv
    directory: /sdks/python
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 2
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["patch", "minor"]

  - package-ecosystem: "pip"
    directories:
      - "/sdks/python/examples/quickstart"
      - "/cmd/hatchet-cli/cli/templates/python/poetry"
      - "/cmd/hatchet-cli/cli/templates/python/pip"
    multi-ecosystem-group: "hatchet-sdk-examples"
    patterns: ["*"]

  - package-ecosystem: "uv"
    directories:
      - "/cmd/hatchet-cli/cli/templates/python/uv"
    multi-ecosystem-group: "hatchet-sdk-examples"
    patterns: ["*"]

  - package-ecosystem: "npm"
    directories:
      - "/frontend/app"
      - "/frontend/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      # TODO(gregfurman): Many of these require require manual intervention, so let's skip for now.
      # See https://github.com/hatchet-dev/hatchet/pull/3748
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 3
    groups:
      npm-deps:
        dependency-type: "production"
        patterns: ["*"]
      npm-dev-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/sdks/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 3
    groups:
      npm-sdk-deps:
        dependency-type: "production"
        patterns: ["*"]
      npm-sdk-dev-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    multi-ecosystem-group: "hatchet-sdk-examples"
    patterns: ["*"]
    directories:
      - "/cmd/hatchet-cli/cli/templates/typescript/npm"
      - "/cmd/hatchet-cli/cli/templates/typescript/pnpm"
      - "/cmd/hatchet-cli/cli/templates/typescript/yarn"

  - package-ecosystem: "bun"
    multi-ecosystem-group: "hatchet-sdk-examples"
    patterns: ["*"]
    directory: "/cmd/hatchet-cli/cli/templates/typescript/bun"

  - package-ecosystem: "bundler"
    directory: "/sdks/ruby/examples"
    multi-ecosystem-group: "hatchet-sdk-examples"
    patterns: ["*"]

  - package-ecosystem: "bundler"
    directory: "/sdks/ruby/src"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 2
    groups:
      ruby-deps:
        patterns: ["*"]
        update-types: ["patch", "minor"]
