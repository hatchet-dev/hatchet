repos:
  - repo: local
    hooks:
      - id: sync-changelog
        name: sync changelog docs
        entry: bash hack/docs/sync-changelog.sh
        language: system
        pass_filenames: false
        files: ^(CHANGELOG\.md|sdks/(python/CHANGELOG\.md|typescript/CHANGELOG\.md|ruby/src/CHANGELOG\.md)|frontend/docs/pages/reference/changelog/.*\.mdx|hack/docs/sync-changelog\.sh|Taskfile\.yaml)$
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        exclude: ^examples/
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^examples/
      - id: end-of-file-fixer
        exclude: ^examples/
      - id: trailing-whitespace
        exclude: ^examples/
      - id: check-yaml
        exclude: (^examples/|^cmd/hatchet-cli/cli/templates/)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
        args: ["--config=.golangci.yml", "--allow-parallel-runners"]
        exclude: ^(examples/|sdks/guides/go/|sdks/go/examples/)
